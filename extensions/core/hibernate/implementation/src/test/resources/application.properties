# H2 In-Memory Database Configuration for Testing
jakarta.persistence.jdbc.driver=org.h2.Driver
jakarta.persistence.jdbc.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
jakarta.persistence.jdbc.user=sa
jakarta.persistence.jdbc.password=

# Hibernate Configuration
hibernate.dialect=org.hibernate.dialect.H2Dialect
hibernate.hbm2ddl.auto=create-drop
hibernate.show_sql=true
hibernate.format_sql=true

# Whitelist/Blacklist Configuration for Testing
blackan.hibernate.discovery.whitelist=io.github.fungrim.blackan.extension.hibernate.dao.WhitelistedEntity
blackan.hibernate.discovery.blacklist=io.github.fungrim.blackan.extension.hibernate.dao.BlacklistedEntity
