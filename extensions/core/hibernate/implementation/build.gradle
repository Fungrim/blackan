plugins {
    id 'java-library'
    id 'org.kordamp.gradle.jandex' version '2.3.0'
    id 'maven-publish'
}

dependencies {
    api project(':extensions:core:hibernate:api')
    implementation project(':common')
    implementation project(':cdi-common')
    implementation project(':injector')
    implementation project(':extensions:bootstrap:grok:implementation')
    implementation project(':extensions:bootstrap:smallrye-config:implementation')
    testImplementation project(':injector')
    testImplementation project(':extensions:bootstrap:slf4j:implementation')
    testImplementation libs.h2
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
            groupId = 'io.github.fungrim.blackan.extension'
            artifactId = 'blackan-hibernate-extension'
            version = "${semver.semver}"
        }
    }
    repositories {
        mavenLocal()
    }
}
